spring.application.name=phamchiloc

# Default datasource (useful when running without Docker). In Docker, these are overridden
# by SPRING_DATASOURCE_* environment variables from docker-compose.
spring.datasource.url=jdbc:h2:mem:phamchiloc;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
